<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FlashLearn PWA</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'FlashLearn','short_name':'Flash','start_url':'.','display':'standalone','background_color':'#f4f4f9','theme_color':'#007bff'}">
    
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #333; --anki-new: #007bff; --anki-learn: #dc3545; --anki-due: #28a745; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f4f4f9; color: var(--dark); display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        header { background: var(--primary); color: white; padding: env(safe-area-inset-top) 15px 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        
        nav { display: flex; background: #0056b3; z-index: 10; }
        nav button { flex: 1; padding: 12px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 0.9rem; transition: 0.3s; }
        nav button.active { color: white; border-bottom: 3px solid #ffc107; font-weight: bold; }
        
        main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .card-stack { position: relative; width: 100%; max-width: 400px; display: flex; justify-content: center; align-items: center; min-height: 350px; margin-top: 20px; }
        .card-bg { position: absolute; width: 95%; height: 95%; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); top: 15px; z-index: 1; }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; height: 100%; text-align: center; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; cursor: pointer; z-index: 2; position: absolute; will-change: transform; }
        
        .question { font-size: 1.8rem; font-weight: 700; color: #222; }
        .answer { font-size: 1.5rem; color: #666; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 25px; animation: fadeIn 0.3s; }
        .swipe-hint { position: absolute; bottom: 15px; left: 0; width: 100%; font-size: 0.85rem; color: #aaa; text-align: center; font-weight: bold; transition: color 0.2s; pointer-events: none; }

        .controls { display: flex; gap: 12px; width: 100%; max-width: 400px; margin-top: 30px; z-index: 10; }
        .action-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-show { background: var(--primary); width: 100%; max-width: 400px; margin-top: 30px; z-index: 10; }
        .btn-hard { background: var(--danger); }
        .btn-easy { background: var(--success); }
        
        .anki-stats { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-top: auto; padding-top: 20px; font-size: 0.95rem; font-weight: bold; border-top: 1px solid #ddd; padding-bottom: 10px; }
        .stat-new { color: var(--anki-new); }
        .stat-learn { color: var(--anki-learn); }
        .stat-due { color: var(--anki-due); }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-list { width: 100%; max-width: 400px; margin-top: 20px; }
        .list-item { background: white; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; border: 1px solid #eee; }
        .btn-del { color: var(--danger); background: none; border: none; font-weight: bold; cursor: pointer; }
        
        /* Neuer Countdown-Style (Riesig und auffällig) */
        .countdown-container { text-align: center; margin-top: 30px; width: 100%; max-width: 300px; }
        .timer-box { background: var(--primary); color: white; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        .timer-time { font-size: 3rem; display: block; margin-top: 10px; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body>

    <header>🧠 FlashLearn</header>
    
    <nav>
        <button id="nav-learn" class="active" onclick="switchView('learn')">Lernen</button>
        <button id="nav-add" onclick="switchView('add')">Karten</button>
    </nav>

    <main id="view-learn">
        
        <div id="stack-container" class="card-stack">
            <div id="card-bg" class="card-bg"></div> 
            
            <div id="card-container" class="card">
                <div id="question-text" class="question">...</div>
                <div id="answer-text" class="answer hidden"></div>
                <div id="swipe-hint" class="swipe-hint">Tippen zum Umdrehen</div>
            </div>
        </div>
        
        <button id="show-btn" class="action-btn btn-show" onclick="showAnswer()">Antwort zeigen</button>
        
        <div id="feedback-btns" class="controls hidden">
            <button class="action-btn btn-hard" onclick="rateCardButton('hard')">👈 Schwer</button>
            <button class="action-btn btn-easy" onclick="rateCardButton('easy')">Einfach 👉</button>
        </div>
        
        <div id="done-msg" class="msg hidden countdown-container">
            <h2 style="font-size: 4rem; margin: 0 0 10px 0;">☕</h2>
            <h3 style="margin: 0 0 5px 0; color: #333;">Pause!</h3>
            <p style="color: #666; margin-bottom: 25px; font-size: 0.9rem;">Du musst auf die nächsten Karten warten.</p>
            
            <div class="timer-box">
                Weiter in:
                <span id="next-timer" class="timer-time">00:00</span>
            </div>
        </div>

        <div class="anki-stats" id="anki-stats-bar">
            <span class="stat-new" id="stat-new">0 Neu</span>
            <span class="stat-learn" id="stat-learn">0 Lernen</span>
            <span class="stat-due" id="stat-due">0 Fällig</span>
        </div>
    </main>

    <main id="view-add" class="hidden">
        <div style="width: 100%; max-width: 400px;">
            <h3>Neue Karte</h3>
            <input type="text" id="new-q" placeholder="Vorderseite" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ccc; box-sizing: border-box; font-size: 1rem;">
            <input type="text" id="new-a" placeholder="Rückseite" style="width:100%; padding:15px; margin-bottom:10px; border-radius:12px; border:1px solid #ccc; box-sizing: border-box; font-size: 1rem;">
            <button class="action-btn btn-easy" style="width: 100%; cursor: pointer;" onclick="addCard()">Hinzufügen</button>
            
            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #ddd;">
            
            <h3>Deine Karten (<span id="total-count">0</span>)</h3>
            <div id="full-list" class="card-list"></div>
        </div>
    </main>

    <script>
        let deck = JSON.parse(localStorage.getItem('myAnkiDeck')) || [];
        deck.forEach(c => {
            if (typeof c.reviews === 'undefined') c.reviews = 0;
            if (typeof c.streak === 'undefined') c.streak = 0;
        });

        let currentCardIndex = -1;

        // --- GESTENSTEUERUNG MIT PHYSIK ---
        const cardEl = document.getElementById('card-container');
        const hintEl = document.getElementById('swipe-hint');
        let isDragging = false;
        let startX = 0, startY = 0;

        cardEl.addEventListener('click', () => {
            if (!isDragging && document.getElementById('answer-text').classList.contains('hidden')) showAnswer();
        });

        cardEl.addEventListener('touchstart', e => {
            if (document.getElementById('answer-text').classList.contains('hidden')) return; 
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            cardEl.style.transition = 'none'; 
        }, {passive: true});

        cardEl.addEventListener('touchmove', e => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;
            cardEl.style.transform = `translate(${deltaX}px, ${deltaY}px) rotate(${deltaX * 0.05}deg)`;
            
            if (deltaX > 60) { hintEl.innerText = "Einfach 👉"; hintEl.style.color = "var(--success)"; } 
            else if (deltaX < -60) { hintEl.innerText = "👈 Schwer"; hintEl.style.color = "var(--danger)"; } 
            else { hintEl.innerText = "Wischen zum Bewerten"; hintEl.style.color = "#aaa"; }
        }, {passive: true});

        cardEl.addEventListener('touchend', e => {
            if (!isDragging) return;
            isDragging = false;
            const deltaX = e.changedTouches[0].clientX - startX;
            cardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease'; 
            
            if (deltaX > 100) {
                cardEl.style.transform = `translate(1000px, 0) rotate(30deg)`; cardEl.style.opacity = '0';
                setTimeout(() => { rateCard('easy'); resetCardPosition(); }, 300);
            } else if (deltaX < -100) {
                cardEl.style.transform = `translate(-1000px, 0) rotate(-30deg)`; cardEl.style.opacity = '0';
                setTimeout(() => { rateCard('hard'); resetCardPosition(); }, 300);
            } else { resetCardPosition(); }
        }, {passive: true});

        function resetCardPosition() {
            cardEl.style.transform = ''; cardEl.style.opacity = '1'; hintEl.style.color = "#aaa";
        }

        function rateCardButton(rating) {
            cardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
            cardEl.style.transform = rating === 'easy' ? `translate(1000px, 0) rotate(30deg)` : `translate(-1000px, 0) rotate(-30deg)`;
            cardEl.style.opacity = '0';
            setTimeout(() => { rateCard(rating); resetCardPosition(); }, 300);
        }
        // ------------------------------------

        function switchView(view) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.remove('hidden');
            document.getElementById('nav-' + view).classList.add('active');
            if (view === 'learn') nextCard();
            if (view === 'add') renderList();
        }

        // KORREKTE ANKI STATISTIK-LOGIK
        function updateStats() {
            let nNew = 0, nLearn = 0, nDue = 0;
            const now = Date.now();
            
            deck.forEach(c => {
                if (c.reviews === 0) {
                    // Karte wurde noch nie angesehen (Blau)
                    nNew++; 
                } else if (c.streak < 2) {
                    // Karte ist angesehen, aber noch nicht auf morgen verschoben (Rot)
                    // Sie bleibt hier drin, auch wenn du gerade 10 Minuten warten musst!
                    nLearn++; 
                } else if (c.nextReview <= now) {
                    // Karte ist alt (Streak 2+) und ihre 24h+ Zeit ist abgelaufen (Grün)
                    nDue++; 
                }
            });
            
            document.getElementById('stat-new').innerText = `${nNew} Neu`;
            document.getElementById('stat-learn').innerText = `${nLearn} Lernen`;
            document.getElementById('stat-due').innerText = `${nDue} Fällig`;
            if(document.getElementById('total-count')) document.getElementById('total-count').innerText = deck.length;
        }

        // RIESEN-COUNTDOWN LOGIK
        function getNextCardTimeStr() {
            const futureCards = deck.filter(c => c.nextReview > Date.now());
            if (futureCards.length === 0) return "Morgen"; // Keine Karten mehr im ganzen Deck
            
            const nextTime = Math.min(...futureCards.map(c => c.nextReview));
            const diff = nextTime - Date.now();
            
            if (diff <= 0) return "00:00";
            
            const totalSeconds = Math.floor(diff / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            if (hours > 0) {
                // Wenn es über eine Stunde dauert, Text-Anzeige
                return `${hours}h ${minutes}m`;
            } else {
                // Wenn es unter einer Stunde ist, digitale Stopuhr (z.B. 09:59)
                return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            }
        }

        function nextCard() {
            updateStats();
            const now = Date.now();
            const dueCards = deck.filter(card => card.nextReview <= now);
            
            if (dueCards.length === 0) {
                // KEINE KARTEN FÄLLIG -> TIMER ZEIGEN
                document.getElementById('stack-container').classList.add('hidden');
                document.getElementById('show-btn').classList.add('hidden');
                document.getElementById('feedback-btns').classList.add('hidden');
                
                document.getElementById('done-msg').classList.remove('hidden');
                document.getElementById('next-timer').innerText = getNextCardTimeStr();
                currentCardIndex = -1;
            } else {
                // KARTEN FÄLLIG -> KARTE ZEIGEN
                const randomDue = dueCards[Math.floor(Math.random() * dueCards.length)];
                currentCardIndex = deck.indexOf(randomDue);

                document.getElementById('stack-container').classList.remove('hidden');
                document.getElementById('done-msg').classList.add('hidden');
                
                document.getElementById('question-text').innerText = deck[currentCardIndex].q;
                document.getElementById('answer-text').innerText = deck[currentCardIndex].a;
                document.getElementById('answer-text').classList.add('hidden');
                document.getElementById('swipe-hint').innerText = "Tippen zum Umdrehen";
                document.getElementById('show-btn').classList.remove('hidden');
                document.getElementById('feedback-btns').classList.add('hidden');
                
                document.getElementById('card-bg').style.display = dueCards.length > 1 ? 'block' : 'none';
            }
        }

        function showAnswer() {
            document.getElementById('answer-text').classList.remove('hidden');
            document.getElementById('show-btn').classList.add('hidden');
            document.getElementById('feedback-btns').classList.remove('hidden');
            document.getElementById('swipe-hint').innerText = "Wischen zum Bewerten";
        }

        function rateCard(rating) {
            if (currentCardIndex === -1) return;
            const now = Date.now();
            let card = deck[currentCardIndex];
            
            card.reviews++; // Karte wurde angesehen! (Rutscht damit von Neu -> Lernen)

            if (rating === 'easy') {
                if (card.streak === 0) {
                    card.nextReview = now + (10 * 60 * 1000); // 1. Mal richtig: +10 Minuten warten
                } else {
                    card.nextReview = now + (24 * 60 * 60 * 1000); // 2. Mal richtig: +24 Stunden
                }
                card.streak++; // Streak geht hoch
            } else {
                card.nextReview = now + (1 * 60 * 1000); // Falsch: +1 Minute warten
                card.streak = 0; // Streak fällt zurück auf 0
            }

            save();
            nextCard();
        }

        function addCard() {
            const q = document.getElementById('new-q').value.trim();
            const a = document.getElementById('new-a').value.trim();
            if (q && a) {
                deck.push({ q, a, nextReview: Date.now(), id: Date.now(), streak: 0, reviews: 0 });
                save();
                document.getElementById('new-q').value = "";
                document.getElementById('new-a').value = "";
                renderList();
                updateStats(); 
            }
        }

        function deleteCard(id) {
            deck = deck.filter(c => c.id !== id);
            save();
            renderList();
        }

        function renderList() {
            const listCont = document.getElementById('full-list');
            if(!listCont) return;
            listCont.innerHTML = deck.map(c => `
                <div class="list-item">
                    <span>${c.q.substring(0, 20)}${c.q.length > 20 ? '...' : ''}</span>
                    <button class="btn-del" onclick="deleteCard(${c.id})">Löschen</button>
                </div>
            `).join('');
            updateStats();
        }

        function save() { localStorage.setItem('myAnkiDeck', JSON.stringify(deck)); }

        // LIVE-TIMER: Läuft jede Sekunde
        setInterval(() => {
            if (!document.getElementById('view-learn').classList.contains('hidden')) {
                const dueCards = deck.filter(card => card.nextReview <= Date.now());
                
                if (dueCards.length > 0 && document.getElementById('stack-container').classList.contains('hidden')) {
                    // Timer ist gerade auf 0 gesprungen! Lade die Karte!
                    nextCard(); 
                } else if (dueCards.length === 0) {
                    // Aktualisiere die Stoppuhr live auf dem Bildschirm
                    const timerEl = document.getElementById('next-timer');
                    if (timerEl) timerEl.innerText = getNextCardTimeStr();
                }
            }
        }, 1000); 

        // Start
        nextCard();
    </script>
</body>
</html>
