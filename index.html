<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FlashLearn PWA</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #333; --anki-new: #007bff; --anki-learn: #dc3545; --anki-due: #28a745; --bg: #f4f4f9; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--dark); display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        header { background: var(--primary); color: white; padding: env(safe-area-inset-top) 15px 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10; }
        
        nav { display: flex; background: #0056b3; z-index: 10; }
        nav button { flex: 1; padding: 12px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 0.9rem; transition: 0.3s; cursor: pointer; }
        nav button.active { color: white; border-bottom: 3px solid #ffc107; font-weight: bold; }
        
        main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; position: relative; width: 100%; box-sizing: border-box; }
        
        /* Karten & Wischen */
        .card-stack { position: relative; width: 100%; max-width: 400px; display: flex; justify-content: center; align-items: center; min-height: 350px; margin-top: 20px; }
        .card-bg { position: absolute; width: 95%; height: 95%; background: white; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); top: 15px; z-index: 1; }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); width: 100%; height: 100%; text-align: center; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; cursor: pointer; z-index: 2; position: absolute; will-change: transform; }
        
        .question { font-size: 1.8rem; font-weight: 700; color: #222; }
        .answer { font-size: 1.5rem; color: #666; margin-top: 25px; border-top: 2px dashed #eee; padding-top: 25px; }
        .swipe-hint { position: absolute; bottom: 15px; left: 0; width: 100%; font-size: 0.85rem; color: #aaa; text-align: center; font-weight: bold; transition: color 0.2s; pointer-events: none; }

        .controls { display: flex; gap: 12px; width: 100%; max-width: 400px; margin-top: 30px; z-index: 10; }
        .action-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-primary { background: var(--primary); }
        .btn-hard { background: var(--danger); }
        .btn-easy { background: var(--success); }
        
        .anki-stats { display: flex; justify-content: space-around; width: 100%; max-width: 400px; margin-top: auto; padding-top: 20px; font-size: 0.95rem; font-weight: bold; border-top: 1px solid #ddd; padding-bottom: 10px; }
        .stat-new { color: var(--anki-new); }
        .stat-learn { color: var(--anki-learn); }
        .stat-due { color: var(--anki-due); }

        .hidden { display: none !important; }

        /* Stapel & Listen */
        .full-width { width: 100%; max-width: 400px; margin: 0 auto; }
        .deck-item { background: white; padding: 15px; margin-bottom: 8px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .deck-info { flex: 1; cursor: pointer; }
        .deck-title { font-weight: bold; font-size: 1.1rem; }
        .deck-stats { font-size: 0.8rem; color: #666; margin-top: 5px; }
        .deck-actions button { background: #eee; border: none; padding: 8px 12px; border-radius: 6px; margin-left: 5px; cursor: pointer; font-size: 0.8rem; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 1rem; font-family: inherit;}
        textarea { resize: vertical; min-height: 100px; }
        
        .countdown-container { text-align: center; margin-top: 30px; }
        .timer-box { background: var(--primary); color: white; padding: 20px; border-radius: 15px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.3); display: inline-block;}
        .timer-time { font-size: 3rem; display: block; margin-top: 10px; font-variant-numeric: tabular-nums; }
        
        /* Modal für Stapel bearbeiten */
        .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .modal { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 350px; }
    </style>
</head>
<body>

    <header>🧠 FlashLearn</header>
    
    <nav>
        <button id="nav-decks" class="active" onclick="switchView('decks')">Stapel</button>
        <button id="nav-learn" onclick="switchView('learn')">Lernen</button>
        <button id="nav-add" onclick="switchView('add')">Karten</button>
    </nav>

    <main id="view-decks">
        <div class="full-width">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="new-deck-name" placeholder="Neuer Stapel Name">
                <button class="action-btn btn-primary" style="flex: 0 0 auto;" onclick="createDeck()">+ Neu</button>
            </div>
            <div id="deck-list"></div>
        </div>
    </main>

    <main id="view-learn" class="hidden">
        <div id="active-deck-title" style="font-weight: bold; color: #666; margin-bottom: 10px;">Bitte wähle einen Stapel</div>
        
        <div id="stack-container" class="card-stack hidden">
            <div id="card-bg" class="card-bg"></div> 
            <div id="card-container" class="card">
                <div id="question-text" class="question">...</div>
                <div id="answer-text" class="answer hidden"></div>
                <div id="swipe-hint" class="swipe-hint">Tippen zum Umdrehen</div>
            </div>
        </div>
        
        <button id="show-btn" class="action-btn btn-primary hidden" style="width:100%; max-width:400px; margin-top:20px;" onclick="showAnswer()">Antwort zeigen</button>
        
        <div id="feedback-btns" class="controls hidden">
            <button class="action-btn btn-hard" onclick="rateCardButton('hard')">👈 Schwer</button>
            <button class="action-btn btn-easy" onclick="rateCardButton('easy')">Einfach 👉</button>
        </div>
        
        <div id="done-msg" class="msg hidden countdown-container">
            <h2 style="font-size: 4rem; margin: 0 0 10px 0;">☕</h2>
            <h3 style="margin: 0 0 5px 0; color: #333;">Stapel erledigt!</h3>
            <div class="timer-box" style="margin-top:20px;">
                Nächste in:
                <span id="next-timer" class="timer-time">00:00</span>
            </div>
        </div>

        <div class="anki-stats" id="anki-stats-bar">
            <span class="stat-new" id="stat-new">0 Neu</span>
            <span class="stat-learn" id="stat-learn">0 Lernen</span>
            <span class="stat-due" id="stat-due">0 Fällig</span>
        </div>
    </main>

    <main id="view-add" class="hidden">
        <div class="full-width">
            <h3>Einzelne Karte</h3>
            <select id="card-deck-select"></select>
            <input type="text" id="new-q" placeholder="Vorderseite">
            <input type="text" id="new-a" placeholder="Rückseite">
            <button class="action-btn btn-easy" style="width: 100%; margin-bottom: 30px;" onclick="addCard()">Hinzufügen</button>
            
            <hr style="border: 0; border-top: 1px solid #ddd; margin-bottom: 20px;">
            
            <h3>Schnell-Import</h3>
            <p style="font-size: 0.8rem; color: #666; margin-top:0;">Format: <code>Vorderseite;Rückseite</code> (pro Zeile eine Karte)</p>
            <select id="import-deck-select"></select>
            <textarea id="import-text" placeholder="Hund;dog&#10;Katze;cat"></textarea>
            <button class="action-btn btn-primary" style="width: 100%;" onclick="importCards()">Importieren</button>
        </div>
    </main>

    <div id="edit-deck-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3>Stapel bearbeiten</h3>
            <input type="hidden" id="edit-deck-id">
            <label style="font-size: 0.8rem; font-weight:bold;">Name</label>
            <input type="text" id="edit-deck-name">
            <label style="font-size: 0.8rem; font-weight:bold;">Verschieben nach (Überstapel)</label>
            <select id="edit-deck-parent"></select>
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="action-btn btn-primary" onclick="saveDeckEdit()">Speichern</button>
                <button class="action-btn" style="background:#888;" onclick="closeModal()">Abbrechen</button>
            </div>
            <button class="action-btn btn-hard" style="width: 100%; margin-top: 15px;" onclick="deleteDeck()">Stapel Löschen</button>
        </div>
    </div>

    <script>
        // --- DATENSTRUKTUR & MIGRATION ---
        let decks = JSON.parse(localStorage.getItem('flashDecks'));
        let cards = JSON.parse(localStorage.getItem('flashCards'));

        // Migration von alten Versionen
        if (!decks || !cards) {
            decks = [{ id: 'root', name: 'Standard', parentId: null }];
            let oldDeck = JSON.parse(localStorage.getItem('myAnkiDeck')) || [];
            cards = oldDeck.map(c => ({
                id: c.id || Date.now() + Math.random(),
                deckId: 'root',
                q: c.q, a: c.a,
                nextReview: c.nextReview || Date.now(),
                streak: c.streak || 0,
                reviews: c.reviews || 0
            }));
            saveData();
        }

        let activeDeckId = null; 
        let currentCardList = []; // Die fälligen Karten des aktuell gewählten Stapels + Unterstapel
        let currentCardIndex = -1;

        function saveData() {
            localStorage.setItem('flashDecks', JSON.stringify(decks));
            localStorage.setItem('flashCards', JSON.stringify(cards));
        }

        // --- HILFSFUNKTIONEN FÜR UNTERSTAPEL ---
        // Holt alle IDs eines Stapels UND seiner Unterstapel (rekursiv)
        function getDeckAndSubDeckIds(parentId) {
            let ids = [parentId];
            const children = decks.filter(d => d.parentId === parentId);
            for (let child of children) {
                ids = ids.concat(getDeckAndSubDeckIds(child.id));
            }
            return ids;
        }

        // --- ANSICHTEN WECHSELN ---
        function switchView(view) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.remove('hidden');
            document.getElementById('nav-' + view).classList.add('active');
            
            if (view === 'decks') renderDecks();
            if (view === 'learn') {
                if(!activeDeckId && decks.length > 0) activeDeckId = decks[0].id;
                startLearning(activeDeckId);
            }
            if (view === 'add') populateSelects();
        }

        // --- STAPEL VERWALTUNG (Decks) ---
        function renderDecks() {
            const list = document.getElementById('deck-list');
            list.innerHTML = '';
            
            // Rekursive Funktion zum Zeichnen des Baums
            function drawNode(parentId, level) {
                const children = decks.filter(d => d.parentId === parentId);
                children.forEach(deck => {
                    const deckIds = getDeckAndSubDeckIds(deck.id);
                    const deckCards = cards.filter(c => deckIds.includes(c.deckId));
                    const dueCount = deckCards.filter(c => c.nextReview <= Date.now()).length;
                    
                    const div = document.createElement('div');
                    div.className = 'deck-item';
                    div.style.marginLeft = `${level * 20}px`;
                    div.innerHTML = `
                        <div class="deck-info" onclick="startLearning('${deck.id}')">
                            <div class="deck-title">${deck.name}</div>
                            <div class="deck-stats">${deckCards.length} Karten gesamt | <span style="color:var(--danger); font-weight:bold;">${dueCount} fällig</span></div>
                        </div>
                        <div class="deck-actions">
                            <button onclick="openEditModal('${deck.id}')">Bearbeiten</button>
                        </div>
                    `;
                    list.appendChild(div);
                    drawNode(deck.id, level + 1); // Unterstapel zeichnen
                });
            }
            drawNode(null, 0); // Start bei Root (ohne Parent)
        }

        function createDeck() {
            const name = document.getElementById('new-deck-name').value.trim();
            if (name) {
                decks.push({ id: 'd_' + Date.now(), name: name, parentId: null });
                saveData();
                document.getElementById('new-deck-name').value = '';
                renderDecks();
            }
        }

        function openEditModal(id) {
            const deck = decks.find(d => d.id === id);
            document.getElementById('edit-deck-id').value = deck.id;
            document.getElementById('edit-deck-name').value = deck.name;
            
            const parentSelect = document.getElementById('edit-deck-parent');
            parentSelect.innerHTML = '<option value="null">-- Kein Überstapel (Ganz oben) --</option>';
            
            decks.forEach(d => {
                // Man darf einen Stapel nicht in sich selbst oder seine eigenen Kinder verschieben
                if (d.id !== deck.id && !getDeckAndSubDeckIds(deck.id).includes(d.id)) {
                    const sel = (d.id === deck.parentId) ? 'selected' : '';
                    parentSelect.innerHTML += `<option value="${d.id}" ${sel}>${d.name}</option>`;
                }
            });
            
            document.getElementById('edit-deck-modal').classList.remove('hidden');
        }

        function saveDeckEdit() {
            const id = document.getElementById('edit-deck-id').value;
            const name = document.getElementById('edit-deck-name').value.trim();
            const parentId = document.getElementById('edit-deck-parent').value;
            
            const deck = decks.find(d => d.id === id);
            if (name) deck.name = name;
            deck.parentId = parentId === "null" ? null : parentId;
            
            saveData();
            closeModal();
            renderDecks();
        }

        function deleteDeck() {
            const id = document.getElementById('edit-deck-id').value;
            if(confirm("Möchtest du diesen Stapel inkl. ALLER Unterstapel und Karten wirklich löschen?")) {
                const idsToDelete = getDeckAndSubDeckIds(id);
                decks = decks.filter(d => !idsToDelete.includes(d.id));
                cards = cards.filter(c => !idsToDelete.includes(c.deckId));
                saveData();
                if(activeDeckId === id) activeDeckId = null;
                closeModal();
                renderDecks();
            }
        }

        function closeModal() { document.getElementById('edit-deck-modal').classList.add('hidden'); }

        // --- LERN LOGIK ---
        function startLearning(deckId) {
            activeDeckId = deckId;
            const deck = decks.find(d => d.id === deckId);
            document.getElementById('active-deck-title').innerText = deck ? `Lerne: ${deck.name}` : '';
            switchView('learn');
            nextCard();
        }

        function updateStats() {
            if(!activeDeckId) return;
            const validDeckIds = getDeckAndSubDeckIds(activeDeckId);
            const contextCards = cards.filter(c => validDeckIds.includes(c.deckId));
            
            let nNew = 0, nLearn = 0, nDue = 0;
            const now = Date.now();
            
            contextCards.forEach(c => {
                if (c.reviews === 0) nNew++; 
                else if (c.streak < 2) nLearn++; 
                else if (c.nextReview <= now) nDue++; 
            });
            
            document.getElementById('stat-new').innerText = `${nNew} Neu`;
            document.getElementById('stat-learn').innerText = `${nLearn} Lernen`;
            document.getElementById('stat-due').innerText = `${nDue} Fällig`;
            return contextCards;
        }

        function nextCard() {
            const contextCards = updateStats();
            if(!contextCards) return;
            
            const now = Date.now();
            currentCardList = contextCards.filter(card => card.nextReview <= now);
            
            if (currentCardList.length === 0) {
                document.getElementById('stack-container').classList.add('hidden');
                document.getElementById('show-btn').classList.add('hidden');
                document.getElementById('feedback-btns').classList.add('hidden');
                document.getElementById('done-msg').classList.remove('hidden');
                updateTimerText(contextCards);
                currentCardIndex = -1;
            } else {
                const randomDue = currentCardList[Math.floor(Math.random() * currentCardList.length)];
                currentCardIndex = cards.indexOf(randomDue); // Index in der globalen Liste!

                document.getElementById('stack-container').classList.remove('hidden');
                document.getElementById('done-msg').classList.add('hidden');
                
                document.getElementById('question-text').innerText = cards[currentCardIndex].q;
                document.getElementById('answer-text').innerText = cards[currentCardIndex].a;
                document.getElementById('answer-text').classList.add('hidden');
                document.getElementById('swipe-hint').innerText = "Tippen zum Umdrehen";
                document.getElementById('show-btn').classList.remove('hidden');
                document.getElementById('feedback-btns').classList.add('hidden');
                document.getElementById('card-bg').style.display = currentCardList.length > 1 ? 'block' : 'none';
            }
        }

        function updateTimerText(contextCards) {
            const futureCards = contextCards.filter(c => c.nextReview > Date.now());
            const timerEl = document.getElementById('next-timer');
            if (futureCards.length === 0) {
                timerEl.innerText = "Morgen";
                return;
            }
            
            const nextTime = Math.min(...futureCards.map(c => c.nextReview));
            const diff = nextTime - Date.now();
            if (diff <= 0) { timerEl.innerText = "00:00"; return; }
            
            const totalSeconds = Math.floor(diff / 1000);
            const hours = Math.floor(totalSeconds / 3600);
            const mins = Math.floor((totalSeconds % 3600) / 60);
            const secs = totalSeconds % 60;

            if (hours > 0) timerEl.innerText = `${hours}h ${mins}m`;
            else timerEl.innerText = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function showAnswer() {
            document.getElementById('answer-text').classList.remove('hidden');
            document.getElementById('show-btn').classList.add('hidden');
            document.getElementById('feedback-btns').classList.remove('hidden');
            document.getElementById('swipe-hint').innerText = "Wischen zum Bewerten";
        }

        function rateCard(rating) {
            if (currentCardIndex === -1) return;
            const now = Date.now();
            let card = cards[currentCardIndex];
            
            card.reviews++; 
            if (rating === 'easy') {
                if (card.streak === 0) card.nextReview = now + (10 * 60 * 1000); 
                else card.nextReview = now + (24 * 60 * 60 * 1000);
                card.streak++;
            } else {
                card.nextReview = now + (1 * 60 * 1000); 
                card.streak = 0;
            }
            saveData();
            nextCard();
        }

        // --- GESTENSTEUERUNG (unverändert) ---
        const cardEl = document.getElementById('card-container');
        const hintEl = document.getElementById('swipe-hint');
        let isDragging = false, startX = 0, startY = 0;

        cardEl.addEventListener('click', () => { if (!isDragging && document.getElementById('answer-text').classList.contains('hidden')) showAnswer(); });
        cardEl.addEventListener('touchstart', e => { if (document.getElementById('answer-text').classList.contains('hidden')) return; isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY; cardEl.style.transition = 'none'; }, {passive: true});
        cardEl.addEventListener('touchmove', e => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            cardEl.style.transform = `translate(${deltaX}px, ${e.touches[0].clientY - startY}px) rotate(${deltaX * 0.05}deg)`;
            if (deltaX > 60) { hintEl.innerText = "Einfach 👉"; hintEl.style.color = "var(--success)"; } else if (deltaX < -60) { hintEl.innerText = "👈 Schwer"; hintEl.style.color = "var(--danger)"; } else { hintEl.innerText = "Wischen zum Bewerten"; hintEl.style.color = "#aaa"; }
        }, {passive: true});
        cardEl.addEventListener('touchend', e => {
            if (!isDragging) return;
            isDragging = false;
            const deltaX = e.changedTouches[0].clientX - startX;
            cardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease'; 
            if (deltaX > 100) { cardEl.style.transform = `translate(1000px, 0) rotate(30deg)`; cardEl.style.opacity = '0'; setTimeout(() => { rateCard('easy'); resetCardPosition(); }, 300); } 
            else if (deltaX < -100) { cardEl.style.transform = `translate(-1000px, 0) rotate(-30deg)`; cardEl.style.opacity = '0'; setTimeout(() => { rateCard('hard'); resetCardPosition(); }, 300); } 
            else { resetCardPosition(); }
        }, {passive: true});
        function resetCardPosition() { cardEl.style.transform = ''; cardEl.style.opacity = '1'; hintEl.style.color = "#aaa"; }
        function rateCardButton(rating) { cardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease'; cardEl.style.transform = rating === 'easy' ? `translate(1000px, 0) rotate(30deg)` : `translate(-1000px, 0) rotate(-30deg)`; cardEl.style.opacity = '0'; setTimeout(() => { rateCard(rating); resetCardPosition(); }, 300); }

        // --- KARTEN HINZUFÜGEN & IMPORT ---
        function populateSelects() {
            const html = decks.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
            document.getElementById('card-deck-select').innerHTML = html;
            document.getElementById('import-deck-select').innerHTML = html;
        }

        function addCard() {
            const q = document.getElementById('new-q').value.trim();
            const a = document.getElementById('new-a').value.trim();
            const dId = document.getElementById('card-deck-select').value;
            if (q && a) {
                cards.push({ id: Date.now(), deckId: dId, q, a, nextReview: Date.now(), streak: 0, reviews: 0 });
                saveData();
                document.getElementById('new-q').value = ""; document.getElementById('new-a').value = "";
                alert("Karte hinzugefügt!");
            }
        }

        function importCards() {
            const text = document.getElementById('import-text').value;
            const targetDeck = document.getElementById('import-deck-select').value;
            if(!text.trim()) return;
            
            const lines = text.split('\n');
            let count = 0;
            
            lines.forEach(line => {
                const parts = line.split(';');
                if (parts.length >= 2) {
                    cards.push({
                        id: Date.now() + Math.random(),
                        deckId: targetDeck,
                        q: parts[0].trim(),
                        a: parts[1].trim(),
                        nextReview: Date.now(),
                        streak: 0,
                        reviews: 0
                    });
                    count++;
                }
            });
            
            saveData();
            document.getElementById('import-text').value = '';
            alert(`${count} Karten erfolgreich importiert!`);
        }

        // Live-Timer check
        setInterval(() => {
            if (!document.getElementById('view-learn').classList.contains('hidden')) {
                const validDeckIds = getDeckAndSubDeckIds(activeDeckId);
                const contextCards = cards.filter(c => validDeckIds.includes(c.deckId));
                const dueCards = contextCards.filter(c => c.nextReview <= Date.now());
                
                if (dueCards.length > 0 && document.getElementById('stack-container').classList.contains('hidden')) {
                    nextCard(); 
                } else if (dueCards.length === 0) {
                    updateTimerText(contextCards);
                }
            }
        }, 1000); 

        // Start (lade Decks)
        renderDecks();
    </script>
</body>
</html>
