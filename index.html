<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FlashLearn PWA</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'FlashLearn','short_name':'Flash','start_url':'.','display':'standalone','background_color':'#f4f4f9','theme_color':'#007bff'}">
    
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #333; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #f4f4f9; color: var(--dark); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--primary); color: white; padding: env(safe-area-inset-top) 15px 15px; text-align: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        nav { display: flex; background: #0056b3; }
        nav button { flex: 1; padding: 12px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 0.9rem; transition: 0.3s; }
        nav button.active { color: white; border-bottom: 3px solid #ffc107; font-weight: bold; }
        
        main { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        .card { background: white; padding: 30px 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; min-height: 250px; display: flex; flex-direction: column; justify-content: center; box-sizing: border-box; transition: transform 0.2s; }
        .question { font-size: 1.6rem; font-weight: 700; color: #222; }
        .answer { font-size: 1.4rem; color: #666; margin-top: 20px; border-top: 2px dashed #eee; padding-top: 20px; animation: fadeIn 0.3s; }
        
        .controls { display: flex; gap: 12px; width: 100%; max-width: 400px; margin-top: 20px; }
        .action-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; color: white; active { transform: scale(0.95); } }
        .btn-show { background: var(--primary); width: 100%; max-width: 400px; margin-top: 20px; }
        .btn-hard { background: var(--danger); }
        .btn-easy { background: var(--success); }
        
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Listen-Ansicht */
        .card-list { width: 100%; max-width: 400px; margin-top: 20px; }
        .list-item { background: white; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        .btn-del { color: var(--danger); background: none; border: none; font-weight: bold; }
        
        .stats { font-size: 0.8rem; margin-top: 10px; color: #888; }
        .import-export { margin-top: 30px; display: flex; gap: 5px; }
        .btn-small { padding: 5px 10px; font-size: 0.7rem; background: #ddd; border-radius: 4px; border: none; }
    </style>
</head>
<body>

    <header>🧠 FlashLearn</header>
    
    <nav>
        <button id="nav-learn" class="active" onclick="switchView('learn')">Lernen</button>
        <button id="nav-add" onclick="switchView('add')">Karten</button>
    </nav>

    <main id="view-learn">
        <div class="stats" id="due-count">Karten fällig: 0</div>
        <div id="card-container" class="card">
            <div id="question-text" class="question">...</div>
            <div id="answer-text" class="answer hidden"></div>
        </div>
        
        <button id="show-btn" class="action-btn btn-show" onclick="showAnswer()">Antwort zeigen</button>
        
        <div id="feedback-btns" class="controls hidden">
            <button class="action-btn btn-hard" onclick="rateCard('hard')">Schwer</button>
            <button class="action-btn btn-easy" onclick="rateCard('easy')">Einfach</button>
        </div>
        
        <div id="done-msg" class="msg hidden">
            <h2 style="font-size: 3rem;">🎉</h2>
            <p>Alles erledigt! Pause verdient.</p>
        </div>
    </main>

    <main id="view-add" class="hidden">
        <div style="width: 100%; max-width: 400px;">
            <h3>Neue Karte</h3>
            <input type="text" id="new-q" placeholder="Vorderseite" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box;">
            <input type="text" id="new-a" placeholder="Rückseite" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box;">
            <button class="action-btn btn-easy" style="width: 100%;" onclick="addCard()">Hinzufügen</button>
            
            <hr style="margin: 25px 0; border: 0; border-top: 1px solid #ddd;">
            
            <h3>Deine Karten (<span id="total-count">0</span>)</h3>
            <div id="full-list" class="card-list"></div>

            <div class="import-export">
                <button class="btn-small" onclick="exportData()">Backup (JSON)</button>
                <button class="btn-small" onclick="importData()">Import</button>
            </div>
        </div>
    </main>

    <script>
        let deck = JSON.parse(localStorage.getItem('myAnkiDeck')) || [
            { q: "Herzlich Willkommen!", a: "Wische nach links zum Starten", nextReview: Date.now(), id: Date.now() }
        ];

        let currentCardIndex = -1;

        function switchView(view) {
            document.querySelectorAll('main').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.remove('hidden');
            document.getElementById('nav-' + view).classList.add('active');
            if (view === 'learn') nextCard();
            if (view === 'add') renderList();
        }

        function updateStats() {
            const due = deck.filter(c => c.nextReview <= Date.now()).length;
            document.getElementById('due-count').innerText = `Karten fällig: ${due}`;
            document.getElementById('total-count').innerText = deck.length;
        }

        function nextCard() {
            updateStats();
            const now = Date.now();
            const dueCards = deck.filter(card => card.nextReview <= now);
            
            if (dueCards.length === 0) {
                document.getElementById('card-container').classList.add('hidden');
                document.getElementById('show-btn').classList.add('hidden');
                document.getElementById('feedback-btns').classList.add('hidden');
                document.getElementById('done-msg').classList.remove('hidden');
            } else {
                // Zufällige Karte aus den fälligen wählen (verhindert feststecken)
                const randomDue = dueCards[Math.floor(Math.random() * dueCards.length)];
                currentCardIndex = deck.indexOf(randomDue);

                document.getElementById('card-container').classList.remove('hidden');
                document.getElementById('done-msg').classList.add('hidden');
                document.getElementById('question-text').innerText = deck[currentCardIndex].q;
                document.getElementById('answer-text').innerText = deck[currentCardIndex].a;
                document.getElementById('answer-text').classList.add('hidden');
                document.getElementById('show-btn').classList.remove('hidden');
                document.getElementById('feedback-btns').classList.add('hidden');
            }
        }

        function showAnswer() {
            document.getElementById('answer-text').classList.remove('hidden');
            document.getElementById('show-btn').classList.add('hidden');
            document.getElementById('feedback-btns').classList.remove('hidden');
        }

        function rateCard(rating) {
            const now = Date.now();
            // Simpler Algorithmus: Easy verdoppelt Intervalle (hier vereinfacht auf Fixwerte)
            deck[currentCardIndex].nextReview = (rating === 'easy') ? now + 86400000 : now + 60000;
            save();
            nextCard();
        }

        function addCard() {
            const q = document.getElementById('new-q').value.trim();
            const a = document.getElementById('new-a').value.trim();
            if (q && a) {
                deck.push({ q, a, nextReview: Date.now(), id: Date.now() });
                save();
                document.getElementById('new-q').value = "";
                document.getElementById('new-a').value = "";
                renderList();
            }
        }

        function deleteCard(id) {
            deck = deck.filter(c => c.id !== id);
            save();
            renderList();
        }

        function renderList() {
            const listCont = document.getElementById('full-list');
            listCont.innerHTML = deck.map(c => `
                <div class="list-item">
                    <span>${c.q.substring(0, 20)}...</span>
                    <button class="btn-del" onclick="deleteCard(${c.id})">Löschen</button>
                </div>
            `).join('');
            updateStats();
        }

        function save() { localStorage.setItem('myAnkiDeck', JSON.stringify(deck)); }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(deck));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", "flashlearn_backup.json");
            dlAnchor.click();
        }

        function importData() {
            const json = prompt("Füge den Inhalt deiner Backup-Datei hier ein:");
            if (json) {
                try {
                    deck = JSON.parse(json);
                    save();
                    location.reload();
                } catch(e) { alert("Fehler beim Import!"); }
            }
        }

        nextCard();
    </script>
</body>
</html>
